id: lead-whatsapp
nome: "Lead WhatsApp"
descricao: "Captação de conversas no WhatsApp para qualquer negócio que atende por chat. Default."
indicado_para:
  - qualquer nicho com atendimento por WhatsApp
  - negócios locais sem site
benchmarks:
  cpm_alerta: 30
  ctr_minimo: 1.0
  cpa_alvo: 8.00

campanha:
  nome: "{{nichoLabel}} · Lead WhatsApp · {{today}}"
  objetivo: MESSAGES
  orcamento_tipo: CBO
  orcamento_diario: "{{budget}}"

conjuntos:
  - nome: "Frio · Raio 5km"
    publico:
      localizacao:
        cidade: "{{business.cidade}}"
        raio_km: 5
      idade_min: 25
      idade_max: 55
      interesses_dinamicos: true
    posicionamentos: [feed_ig, feed_fb, stories_ig, reels_ig]
    otimizacao: CONVERSATIONS
    janela_atribuicao: "1d_click"

  - nome: "Morno · Engajou 90d"
    publico:
      custom_audience: engajou_pagina_90d
      lookalike: false
    posicionamentos: [feed_ig, stories_ig, reels_ig]
    otimizacao: CONVERSATIONS

anuncios:
  - tipo: imagem
    variante: A
    cta: SEND_MESSAGE
    destino: whatsapp_business
    midia: cliente_fornece              # 1 foto da pasta ~/.easy4u-trafego/midias/
    angulo_copy: oferta_principal
  - tipo: imagem
    variante: B
    cta: SEND_MESSAGE
    destino: whatsapp_business
    midia: cliente_fornece              # foto diferente da variante A
    angulo_copy: prova_social
  - tipo: video_curto
    duracao_seg: 15
    cta: SEND_MESSAGE
    destino: whatsapp_business
    midia: cliente_fornece              # vídeo .mp4/.mov até 4GB, idealmente 9:16
    angulo_copy: produto_em_acao
  - tipo: carrossel
    num_cards: 4
    cta: SEND_MESSAGE
    destino: whatsapp_business
    midia: cliente_fornece              # 4 fotos, mesma proporção

regras_otimizacao:
  - { se: "cpm > 30", por_dias: 3, acao: pausar_conjunto }
  - { se: "ctr < 1",  por_dias: 2, acao: trocar_criativo }
  - { se: "cpa < cpa_alvo", acao: duplicar_com_30pct_budget }
  - { se: "frequencia > 3", janela_dias: 7, acao: renovar_criativo }
