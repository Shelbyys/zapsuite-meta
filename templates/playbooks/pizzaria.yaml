id: pizzaria
nome: "Pizzaria / Delivery"
descricao: "Captação de pedido por WhatsApp para pizzaria, hamburgueria, açaí, qualquer delivery local."
indicado_para:
  - pizzaria, hamburgueria, açaí
  - restaurante com delivery próprio
  - food trucks com pedido por WhatsApp
benchmarks:
  cpm_alerta: 25
  ctr_minimo: 1.2
  cpa_alvo: 5.00

campanha:
  nome: "{{nichoLabel}} · Delivery · {{today}}"
  objetivo: MESSAGES
  orcamento_tipo: CBO
  orcamento_diario: "{{budget}}"
  programacao:
    horarios_de_pico:
      - { dias: [qui, sex, sab, dom], inicio: "18:00", fim: "23:00", boost_pct: 50 }

conjuntos:
  - nome: "Frio · Raio 5km · Famílias"
    publico:
      localizacao:
        cidade: "{{business.cidade}}"
        raio_km: 5
      idade_min: 25
      idade_max: 55
      comportamentos: ["Pais/responsáveis"]
      interesses: ["Pizza", "Delivery de comida", "Restaurantes"]
    posicionamentos: [feed_ig, feed_fb, stories_ig, reels_ig]
    otimizacao: CONVERSATIONS

  - nome: "Morno · Engajou 60d"
    publico:
      custom_audience: engajou_pagina_60d
    posicionamentos: [feed_ig, stories_ig, reels_ig]
    otimizacao: CONVERSATIONS

  - nome: "Quente · Cardápio 30d (retargeting)"
    publico:
      custom_audience: visitou_link_cardapio_30d
    posicionamentos: [feed_ig, stories_ig]
    otimizacao: CONVERSATIONS

anuncios:
  - tipo: imagem
    variante: A
    cta: SEND_MESSAGE
    destino: whatsapp_business
    criativo_brief: "foto real do produto chegando à mesa, sem stock photo"
  - tipo: imagem
    variante: B
    cta: SEND_MESSAGE
    destino: whatsapp_business
    criativo_brief: "ângulo combo + preço promocional sexta-domingo"
  - tipo: video_curto
    duracao_seg: 12
    cta: SEND_MESSAGE
    destino: whatsapp_business
    criativo_brief: "preparo do produto em close (mão na massa, queijo derretendo)"
  - tipo: carrossel
    num_cards: 4
    cta: SEND_MESSAGE
    destino: whatsapp_business
    criativo_brief: "4 sabores principais ou 4 combos"

regras_otimizacao:
  - { se: "cpm > 25", por_dias: 3, acao: pausar_conjunto }
  - { se: "ctr < 1.2", por_dias: 2, acao: trocar_criativo }
  - { se: "cpa < cpa_alvo", acao: duplicar_com_30pct_budget }
  - { se: "frequencia > 3", janela_dias: 7, acao: renovar_criativo }
  - { se: "horario_de_pico", acao: aumentar_lance_temporariamente }
